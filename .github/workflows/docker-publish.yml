name: Docker publish

# Builds the three images on every push/PR (verifying the Dockerfiles) and pushes them to
# GHCR only on a version tag. Runs alongside the binary Release workflow. All values below
# flow into action inputs (with:/if:), never into a shell, so there is no injection surface.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: daemon, dockerfile: docker/Dockerfile.daemon }
          - { name: web, dockerfile: docker/Dockerfile.web }
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      # Log in only when we will push (tags); fork PRs have no package-write token.
      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/orkis-${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build (and push on tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref_type == 'tag' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
