name: Docker publish

# Builds and pushes the daemon + gateway images to GHCR on a version tag. A manual run
# (workflow_dispatch) builds them to verify the Dockerfiles without pushing. Mirrors the
# binary Release workflow's trigger. All values flow into action inputs, never a shell.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: daemon, dockerfile: docker/Dockerfile.daemon }
          - { name: web, dockerfile: docker/Dockerfile.web }
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # Log in only when we will push (tags); a manual verify run needs no token.
      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/orkis-${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=edge,enable=${{ github.ref_type != 'tag' }}

      - name: Build (push on tags)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref_type == 'tag' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
